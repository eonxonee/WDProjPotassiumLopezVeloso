<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Hannah Lopez and Mathea Veloso">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <title>KALLERGIS CONUNDRUM</title>
    <link rel="stylesheet" href="main files/stylesheetIndex.css">
</head>
<body onload="loaded()">

<div class="main">
<div class="grid-container">
    <div id="A"><img src='assets/calendarIcon.png'></div>

    <div id="B"><img src='assets/randImg.png'></div>

    <div id="C"><img src='assets/recordDisk.png' id="rD"></div>

    <div id="D"><img src='assets/music1.jpg'><img src='assets/Files.png'></div>

    <div id="E"class="smallApp"><img src='assets/Files.png'><br><p>Files</p></div>

    <div id="F" class="smallApp"></div>

    <div id="G"class="smallApp"></div>

    <div id="H"class="smallApp"></div>

    <div id="I" class="smallApp"></div>

    <div id="J" class="smallApp"></div>

    <div id="K" class="smallApp"></div>

    <div id="L"class="smallApp"></div>

    <div id="M"class="smallApp"></div>

    <div id="N" class="smallApp"></div>
    
    <div id="mask"></div>
    <div class="toggle-footer" id="toggleFooter"><button id="footer-toggle-button" onclick="footerToggle()">//OPEN FOOTER//</button></div>


    <div class="footer" id="footer">
        <button id="notesBtn" onclick="footerClose()">NOTES</button>
        <button id="guessperpBtn" onclick="window.location.href='main files/guessPerpetrator.html'">GUESS PERPETRATOR</button>
    </div>
</div>
    <div id="notes">
        <div id="notesheader">
            <h1>Notes</h1>
        <button id="closeNotes" onclick="closeNotes()">X</button>
        </div>
        <div id="notesControls">
            <button id="add" onclick="newNote()">+</button>
            <button id="remove" onclick="removeNote()">-</button>
        </div>
        <div id="previewNotes"></div>
        <div id=openNotes>
            <form id="notesInput">
            <input type="text" id="notesTitle" placeholder="New Note">
            <textarea id="notesContent" placeholder="Pay attention. Be astonished. Tell about it. What have you discovered?"></textarea>
            <button id="save" onclick="saved(event)"><img src="assets/logonobg.png"></button>
            </form>
        </div>

    </div>
</div>

<script src="main files/main.js"></script>
</body>
</html>
